<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Item Barang Sparepart</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  
<style>
  .search-box {
    border: 2px solid #2e7d32;   /* Garis hijau tua */
    border-radius: 10px;         /* Sudut melengkung */
    overflow: hidden;
    box-shadow: 0 3px 8px rgba(0,0,0,0.15); /* Bayangan elegan */
    background-color: #ffffff;   /* Latar putih bersih */
  }
  .search-box .input-group-text {
    background-color: #a8e6cf;   /* Hijau mint lembut */
    border: none;
    font-size: 1.2rem;
    color: #1b5e20;
  }
  .search-box .form-control {
    border: none;
    box-shadow: none;
    padding: 12px;
    font-size: 1rem;
  }
  .search-box .form-control:focus {
    outline: none;
    background-color: #f5fff8;   /* Highlight hijau muda saat fokus */
    box-shadow: inset 0 0 5px #2e7d32;
  }
  .table {
    margin: 0 auto;
    text-align: center;
    background-color: #e8fff1;
    border-radius: 1px;
    overflow: hidden;
    box-shadow: 0 4px 5px rgba(0,0,0,0.1);
    border: 2px solid #2e7d32; /* Garis luar tabel */
  }
  .table thead tr {
    border-top: 4px solid #1b5e20; /* Garis tebal di atas header */
  }
  .table th {
    background-color: #a8e6cf;
    color: #333;
    text-align: center;
    font-weight: 700;
    border: 3px solid #1b5e20; /* Garis header lebih tebal */
    vertical-align: middle;     /* Posisi teks di tengah vertikal */
    padding: 12px;              /* Jarak atas-bawah agar seimbang */
  }
  .table td {
    text-align: center;
    vertical-align: middle;
    background-color: #fafffb;
    border: 1px solid #2e7d32; /* Garis sel biasa lebih tipis */
    padding: 10px;
  }
  .table img {
    max-width: 80px;
    border-radius: 6px;
    transition: transform 0.2s;
  }
  .table img:hover {
    transform: scale(1.1);
  }
</style>
</head>

<body>
  <div class="container my-4">
    <h2 class="text-center mb-4">📦 Item/Barang Mesin HDN8/LOHIA</h2>

     <!-- Input pencarian dengan ikon -->
<div class="input-group mb-3 search-box">
  <span class="input-group-text">
    <i class="bi bi-search"></i>
  </span>
  <input type="text" id="searchInput" class="form-control" placeholder="Cari nama barang">
</div>

<!-- Tambahkan Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</div>
   <div class="table-responsive">
  <table class="table table-striped table-hover table-bordered align-middle" id="data-table">
    <thead>
      <tr>
        <th>ID BARANG</th>
        <th>NAMA BARANG</th>
        <th>PEMAKAIAN</th>
        <th>FOTO</th>
      </tr>
    </thead>
    <tbody>
      <!-- Data dari spreadsheet akan dimasukkan di sini -->
    </tbody>
  </table>
</div>
<div id="noDataMessage" class="text-center mt-3" style="display:none; color:#d32f2f; font-weight:600;">
  ❌ Tidak ada data yang sesuai, hubungi sparepart untuk info lebih lanjut
</div>
<script>
  const sheetUrl = "https://docs.google.com/spreadsheets/d/1uPTRJUniSCeU2SVbEl_7sLQiXK_lVnHUeorrByNjJ1Q/gviz/tq?tqx=out:json";

https://docs.google.com/spreadsheets/d/1uPTRJUniSCeU2SVbEl_7sLQiXK_lVnHUeorrByNjJ1Q/edit?usp=drivesdk

  fetch(sheetUrl)
    .then(res => res.text())
    .then(data => {
      const json = JSON.parse(data.substr(47).slice(0, -2));
      const rows = json.table.rows;
      const tbody = document.querySelector("#data-table tbody");

      // Lewati 2 baris pertama
      rows.slice(1).forEach(row => {
        const kodeSP = row.c[0]?.v || "";
        const namaBarang = row.c[1]?.v || "";
        const namaLain = row.c[2]?.v || "";
        const fotoLink = row.c[3]?.v || "";

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${kodeSP}</td>
          <td>${namaBarang}</td>
          <td>${namaLain}</td>
          <td>
            <a href="${fotoLink}" target="_blank">
              <img src="${fotoLink}" alt="Lihat Foto">
            </a>
          </td>
      `;
          tbody.appendChild(tr);
        });
      })
      .catch(err => console.error("Error:", err));

  // Fungsi pencarian
document.getElementById("searchInput").addEventListener("keyup", function() {
  const filter = this.value.toLowerCase();
  const rows = document.querySelectorAll("#data-table tbody tr");
  let visibleCount = 0;

  rows.forEach(row => {
    const text = row.innerText.toLowerCase();
    if (text.includes(filter)) {
      row.style.display = "";
      visibleCount++;
    } else {
      row.style.display = "none";
    }
  });

  // Tampilkan pesan jika tidak ada data
  const noDataMessage = document.getElementById("noDataMessage");
  if (visibleCount === 0) {
    noDataMessage.style.display = "block";
  } else {
    noDataMessage.style.display = "none";
  }
  
    });
  </script>
</body>
</html>
