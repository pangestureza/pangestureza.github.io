<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Item Barang Sparepart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
  .search-box {
    border: 2px solid #2e7d32;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 3px 8px rgba(0,0,0,0.15);
    background-color: #ffffff;
  }
  .search-box .input-group-text {
    background-color: #a8e6cf;
    border: none;
    font-size: 1.2rem;
    color: #1b5e20;
  }
  .search-box .form-control {
    border: none;
    box-shadow: none;
    padding: 12px;
    font-size: 1rem;
  }
  .search-box .form-control:focus {
    outline: none;
    background-color: #f5fff8;
    box-shadow: inset 0 0 5px #2e7d32;
  }
  .table {
    margin: 0 auto;
    text-align: center;
    background-color: #e8fff1;
    border-radius: 1px;
    box-shadow: 0 4px 5px rgba(0,0,0,0.1);
    border: 2px solid #2e7d32;
  }
  .table th {
    background-color: #a8e6cf;
    color: #333;
    text-align: center;
    font-weight: 700;
    border: 3px solid #1b5e20;
    vertical-align: middle;
    padding: 12px;
  }
  .table td {
    text-align: center;
    vertical-align: middle;
    background-color: #fafffb;
    border: 1px solid #2e7d32;
    padding: 10px;
  }
  .table img {
    max-width: 80px;
    border-radius: 6px;
    transition: transform 0.2s;
  }
  .table img:hover {
    transform: scale(1.1);
  }
  .text-belum-ada {
    color: #d32f2f;
    font-weight: 100;
  }

  /* Sticky header */
  .table thead th {
    position: sticky;
    top: 0;
    z-index: 100;
    background-color: #a8e6cf;
  }
</style>
</head>

<body>
  <div class="container my-4">
    <h2 class="text-center mb-4">📦 Item/Barang Mesin Needle</h2>

    <div class="input-group mb-3 search-box">
      <span class="input-group-text">
        <i class="bi bi-search"></i>
      </span>
      <input type="text" id="searchInput" class="form-control" placeholder="Cari nama barang">
    </div>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  </div>

  <div class="table-responsive">
    <table class="table table-striped table-hover table-bordered align-middle" id="data-table">
      <thead>
        <tr>
          <th>ID BARANG</th>
          <th>NAMA BARANG</th>
          <th>PEMAKAIAN</th>
          <th>FOTO</th>
        </tr>
      </thead>
      <tbody>
        <!-- Data dari spreadsheet akan dimasukkan di sini -->
      </tbody>
    </table>
  </div>

  <div id="noDataMessage" class="alert alert-danger text-center mt-3" style="display:none; font-weight:600;">
    ❌ Tidak ada data yang sesuai
  </div>

<script>
  const sheetUrl = "https://docs.google.com/spreadsheets/d/1lZnGWD7Or9nUcvSDEaoQLNltNHSnDkbtG5vC20H8brM/gviz/tq?tqx=out:json";

  fetch(sheetUrl)
    .then(res => res.text())
    .then(data => {
      const json = JSON.parse(data.substr(47).slice(0, -2));
      const rows = json.table.rows;
      const tbody = document.querySelector("#data-table tbody");
      
      rows.slice(1).forEach(row => {
        const kodeSP = row.c[0]?.v || "";
        const namaBarang = row.c[1]?.v || "";
        const Pemakaian = row.c[2]?.v || "";
        const fotoLink = row.c[3]?.v || "";

        const hasData = [kodeSP, namaBarang, Pemakaian, fotoLink].some(val => val !== "");

        const kodeSPVal = kodeSP || (hasData ? '<span class="text-belum-ada">Belum ada data</span>' : "");
        const namaBarangVal = namaBarang || (hasData ? '<span class="text-belum-ada">Belum ada data</span>' : "");
        const PemakaianVal = Pemakaian || (hasData ? '<span class="text-belum-ada">Belum ada data</span>' : "");

        let fotoHTML;
        if (!fotoLink && hasData) {
          fotoHTML = `<span class="text-belum-ada">Belum ada data</span>`;
        } else if (fotoLink) {
          fotoHTML = `<a href="${fotoLink}" target="_blank"><img src="${fotoLink}" alt="Lihat Foto"></a>`;
        } else {
          fotoHTML = "";
        }

        if (!hasData) return;

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td data-search="${kodeSP}">${kodeSPVal}</td>
          <td data-search="${namaBarang}">${namaBarangVal}</td>
          <td data-search="${Pemakaian}">${PemakaianVal}</td>
          <td data-search="${fotoLink}">${fotoHTML}</td>
        `;
        tbody.appendChild(tr);
      });
    })
    .catch(err => console.error("Error:", err));

  document.getElementById("searchInput").addEventListener("keyup", function() {
    const filter = this.value.toLowerCase();
    const rows = document.querySelectorAll("#data-table tbody tr");
    let visibleCount = 0;

    rows.forEach(row => {
      let match = false;
      row.querySelectorAll("td").forEach(cell => {
        const searchVal = cell.getAttribute("data-search")?.toLowerCase() || "";
        if (searchVal.includes(filter)) {
          match = true;
        }
      });
      if (match) {
        row.style.display = "";
        visibleCount++;
      } else {
        row.style.display = "none";
      }
    });

    const noDataMessage = document.getElementById("noDataMessage");
    noDataMessage.style.display = visibleCount === 0 ? "block" : "none";
  });
</script>
</body>
</html>
